<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        <thead>
            <tr>

            <tr>

            <tr>
                <td>Headphones</td>

            </tr>

        <tfoot >

                <td colspan="3" align="center">Total Items: 30</td>
            </tr>
        </tfoot>
    </table>

</html>
